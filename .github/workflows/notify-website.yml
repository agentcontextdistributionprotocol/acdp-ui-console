name: Notify Website of Doc Changes

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website sync
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ACDP_WEBSITE_SYNC_TOKEN }}
          repository: agentcontextdistributionprotocol/acdp-website
          event-type: docs-updated
