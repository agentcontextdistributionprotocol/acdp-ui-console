name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/agentcontextdistributionprotocol/acdp-ui-console

jobs:
  image:
    name: Build image (publish on main / tags)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push. Pull-request builds (including
      # from forks with a read-only token) stay build-only and skip login.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* is inlined at build time. We publish the self-contained
          # demo image (the Dockerfile default); real-mode builds override the ARG
          # locally via the sibling compose files.
          build-args: |
            NEXT_PUBLIC_ACDP_UI_DEMO_MODE=true
            NEXT_PUBLIC_APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
