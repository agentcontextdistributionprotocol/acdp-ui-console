version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Batch routine minor/patch bumps into one PR; majors get their own.
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major-updates:
        update-types: [major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
